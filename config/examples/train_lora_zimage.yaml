job: "extension"
config:
  name: "Rita Z"
  process:
    - type: "diffusion_trainer"
      training_folder: "E:\\AI toolkit\\AI-Toolkit-Easy-Install\\AI-Toolkit\\output"
      sqlite_db_path: "./aitk_db.db"
      device: "cuda"
      trigger_word: "Rita"
      performance_log_every: 10
      network:
        type: "lora"
        linear: 32
        linear_alpha: 32
        conv: 16
        conv_alpha: 16
        lokr_full_rank: true
        lokr_factor: -1
        network_kwargs:
          ignore_if_contains: []
      save:
        dtype: "bf16"
        save_every: 250
        max_step_saves_to_keep: 12
        save_format: "diffusers"
        push_to_hub: false
      datasets:
        - folder_path: "E:\\AI toolkit\\AI-Toolkit-Easy-Install\\AI-Toolkit\\datasets/rita"
          mask_path: null
          mask_min_value: 0.1
          default_caption: "Rita"
          caption_ext: "txt"
          caption_dropout_rate: 0.05
          cache_latents_to_disk: false
          is_reg: false
          network_weight: 1
          resolution:
            - 512
            - 768
            - 1024
          controls: []
          shrink_video_to_frames: true
          num_frames: 1
          do_i2v: true
          flip_x: false
          flip_y: false
      train:
        batch_size: 1
        bypass_guidance_embedding: false
        steps: 3000
        gradient_accumulation: 1
        train_unet: true
        train_text_encoder: false
        gradient_checkpointing: true
        noise_scheduler: "flowmatch"
        optimizer: "adamw8bit"
        timestep_type: "weighted"
        content_or_style: "balanced"
        optimizer_params:
          weight_decay: 0.0001
        unload_text_encoder: false
        cache_text_embeddings: false
        lr: 0.0001
        ema_config:
          use_ema: false
          ema_decay: 0.99
        skip_first_sample: false
        force_first_sample: false
        disable_sampling: false
        dtype: "bf16"
        diff_output_preservation: false
        diff_output_preservation_multiplier: 1
        diff_output_preservation_class: "person"
        switch_boundary_every: 1
        loss_type: "mse"
      model:
        name_or_path: "Tongyi-MAI/Z-Image-Turbo"
        quantize: true
        qtype: "qfloat8"
        quantize_te: true
        qtype_te: "qfloat8"
        arch: "zimage:turbo"
        low_vram: true
        model_kwargs: {}
        layer_offloading: false
        layer_offloading_text_encoder_percent: 1
        layer_offloading_transformer_percent: 1
        assistant_lora_path: "ostris/zimage_turbo_training_adapter/zimage_turbo_training_adapter_v1.safetensors"
      sample:
        sampler: "flowmatch"
        sample_every: 250
        width: 1024
        height: 1024
        samples:
          - prompt: "a Rita holding a coffee cup, in a beanie, sitting at a cafe"
          - prompt: "a Rita is a DJ at a night club, fish eye lens, smoke machine, lazer lights, holding a martini"
          - prompt: "a Rita showing off her cool new t shirt at the beach, a shark is jumping out of the water in the background"
          - prompt: "Rita sitting on the bench in public park wearing red dress, brown leather boots talking with bald guy with beard  guy in black shirt blue jeans"
          - prompt: "Rita playing the guitar, on stage, singing a song, laser lights, punk rocker"
          - prompt: "Rita laying un the beach smoking cigarette in black bikini"
          - prompt: "photo of a Rita, white background, medium shot, modeling clothing, studio lighting, white backdrop"
          - prompt: "a Rita holding a sign that says, 'this is a sign'"
        neg: ""
        seed: 42
        walk_seed: true
        guidance_scale: 1
        sample_steps: 9
        num_frames: 1
        fps: 1
meta:
  name: "[name]"
  version: "1.0"